<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 外円 -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- 内円 -->
  <circle cx="100" cy="100" r="7" fill="#6B7280"/>

  <!-- N -->
  <text x="100" y="24" text-anchor="middle" font-family="DM Mono, monospace" font-size="13" font-weight="500" fill="#1a1a1a">N</text>
  <!-- S -->
  <text x="100" y="186" text-anchor="middle" font-family="DM Mono, monospace" font-size="13" font-weight="500" fill="#1a1a1a">S</text>
  <!-- E -->
  <text x="182" y="105" text-anchor="middle" font-family="DM Mono, monospace" font-size="13" font-weight="500" fill="#1a1a1a">E</text>
  <!-- W -->
  <text x="18" y="105" text-anchor="middle" font-family="DM Mono, monospace" font-size="13" font-weight="500" fill="#1a1a1a">W</text>

  <!-- 目盛り -->
  <g stroke="#ddd" stroke-width="1">
    <line x1="100" y1="13" x2="100" y2="22"/>
    <line x1="100" y1="178" x2="100" y2="187"/>
    <line x1="13" y1="100" x2="22" y2="100"/>
    <line x1="178" y1="100" x2="187" y2="100"/>
    <line x1="136" y1="27" x2="130" y2="36"/>
    <line x1="173" y1="64" x2="164" y2="70"/>
    <line x1="173" y1="136" x2="164" y2="130"/>
    <line x1="136" y1="173" x2="130" y2="164"/>
    <line x1="64" y1="173" x2="70" y2="164"/>
    <line x1="27" y1="136" x2="36" y2="130"/>
    <line x1="27" y1="64" x2="36" y2="70"/>
    <line x1="64" y1="27" x2="70" y2="36"/>
  </g>

  <!-- 北針（アンバー） -->
  <polygon points="100,36 114,100 100,92 86,100" fill="#F5A623"/>
  <!-- 南針（グレー） -->
  <polygon points="100,164 114,100 100,108 86,100" fill="#6B7280" opacity="0.35"/>
  <!-- 東針（グレー） -->
  <polygon points="164,100 100,114 108,100 100,86" fill="#6B7280" opacity="0.35"/>
  <!-- 西針（グレー） -->
  <polygon points="36,100 100,114 92,100 100,86" fill="#6B7280" opacity="0.35"/>
</svg>
